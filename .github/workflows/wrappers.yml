name: wrappers

# Wails desktop shell build (LYCM-300). Scoped to the wrapper + frontend sources
# so backend-only changes don't pay for it (mirrors argosy's per-area job split
# in mobile.yml). Builds the debug .exe and uploads it; signing/release is a
# separate concern. (The Android app is native Flutter, built by mobile.yml.)
on:
  pull_request:
    paths: ["wrappers/**", "web/**", ".github/workflows/wrappers.yml"]
  push:
    branches: [main]
    paths: ["wrappers/**", "web/**", ".github/workflows/wrappers.yml"]

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1
      # copy-dist.mjs runs `npm run build:native` in web/, which needs vue-tsc —
      # install web deps explicitly so it's present regardless of whether wails
      # runs frontend:install.
      - name: Install web deps (for the Wails frontend build)
        run: npm --prefix web ci
      # frontend:build builds web/ in native mode and copies the bundle in.
      # -skipbindings: the app binds no Go methods (see app.go).
      - name: Build Windows .exe
        working-directory: wrappers/wails
        run: wails build -platform windows/amd64 -skipbindings
      - uses: actions/upload-artifact@v4
        with:
          name: lyceum-windows
          path: wrappers/wails/build/bin/Lyceum.exe
