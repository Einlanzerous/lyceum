name: release

# Build the Wails Windows installer (LYCM-300) and publish it to a GitHub
# Release. Fires on a version tag (e.g. v0.1.0) or manual dispatch. NSIS ships
# preinstalled on the windows-latest runner image, so `wails build -nsis` finds
# makensis with no extra install.
#
# This builds the GENERIC installer — no baked server URL — so a public artifact
# never carries a private address. The zero-config "my library" flavor is built
# locally with VITE_LYCEUM_DEFAULT_SERVER (see wrappers/wails/README.md).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version for the installer (e.g. 0.1.0). Defaults to the tag; used for a dry-run artifact when dispatched off a branch."
        required: false

permissions:
  contents: write # create/update the GitHub Release

jobs:
  windows-installer:
    runs-on: windows-latest
    # Code signing is opt-in: these are '' until the repo has the secrets, which
    # keeps the sign step below skipped. See wrappers/wails/README.md to enable.
    env:
      WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
      WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1

      # copy-dist.mjs runs `npm run build:native` in web/, which needs vue-tsc —
      # install web deps explicitly so it's present regardless of frontend:install.
      - name: Install web deps
        run: npm --prefix web ci

      # The installer version (Add/Remove Programs + file properties) comes from
      # wails.json info.productVersion. Stamp it from the tag so each release is
      # versioned without a source bump; fall back to 0.0.0 for branch dispatches.
      - name: Stamp installer version
        shell: bash
        run: |
          RAW="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${RAW#v}"
          [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+)* ]] || VERSION="0.0.0"
          echo "Building installer version $VERSION"
          export VERSION
          node -e "const fs=require('fs'),f='wrappers/wails/wails.json',j=JSON.parse(fs.readFileSync(f));j.info=j.info||{};j.info.productVersion=process.env.VERSION;fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')"

      # frontend:build builds web/ in native mode and copies the bundle in; -nsis
      # then runs makensis on build/windows/installer/project.nsi to wrap the exe
      # (which also bundles the WebView2 bootstrapper). -skipbindings: the app
      # binds no Go methods (see app.go), lossless on Windows too.
      - name: Build installer
        working-directory: wrappers/wails
        run: wails build -platform windows/amd64 -skipbindings -nsis

      # Optional Authenticode signing of the installer. Skipped unless the repo
      # has WINDOWS_PFX_BASE64 (base64 of a .pfx) + WINDOWS_PFX_PASSWORD. To also
      # sign the inner Lyceum.exe, split the build (build exe -> sign -> makensis)
      # or use the !finalize hook in project.nsi.
      - name: Sign installer
        if: env.WINDOWS_PFX_BASE64 != ''
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'cert.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
          $signtool = (Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe' |
            Sort-Object FullName -Descending | Select-Object -First 1).FullName
          & $signtool sign /f $pfx /p $env:WINDOWS_PFX_PASSWORD /fd SHA256 `
            /tr http://timestamp.digicert.com /td SHA256 `
            'wrappers\wails\build\bin\Lyceum-amd64-installer.exe'
          Remove-Item $pfx

      # Tag builds publish a Release; branch/manual dispatches just upload the
      # installer as a run artifact for a dry run.
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wrappers/wails/build/bin/Lyceum.exe
            wrappers/wails/build/bin/Lyceum-amd64-installer.exe
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lyceum-windows-installer
          path: wrappers/wails/build/bin/Lyceum-amd64-installer.exe
          if-no-files-found: error
