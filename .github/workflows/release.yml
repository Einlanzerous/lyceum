name: Release Please

# Automated releases (LYCM-300). Release Please watches conventional commits on
# main and maintains a release PR (version bump + CHANGELOG). Merging that PR
# creates the tag + GitHub Release; windows-release then builds the NSIS
# installer and attaches it, and mobile-release builds the signed Android
# APK/AAB (LYCM-700). No hand-cut tags.
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      # Mint a short-lived installation token from our GitHub App so the release
      # PR/tag is created by the App identity rather than the default
      # GITHUB_TOKEN. Events from GITHUB_TOKEN don't trigger other workflows
      # (GitHub's anti-recursion safeguard), so an App-minted token is what makes
      # the release PR's required checks run and lets the tag reach downstream
      # jobs. Uses the org's RELEASE_BOT_APP_ID + RELEASE_BOT_PRIVATE_KEY secrets
      # (the release bot is installed org-wide with Contents + Pull requests:
      # write), matching the switchyard/aperture setup.
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # When a release is cut, build the signed Flutter Android app (LYCM-700) and
  # attach the APK to the GitHub Release (+ push the AAB to Play internal when
  # PLAY_SERVICE_ACCOUNT_JSON is set). Called here — in the same push-to-main run
  # that cut the tag — rather than via `on: push: tags`, so it fires exactly once
  # regardless of whether the App-token-pushed tag re-triggers a tag event.
  # `secrets: inherit` passes the ANDROID_* / PLAY_* secrets through.
  mobile-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/mobile-release.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit

  # When a release is cut, build the Wails Windows installer and attach it to the
  # GitHub Release. Extracted into a reusable workflow (mirrors mobile-release)
  # so it's also dispatchable by hand for an existing tag. Called in the same
  # push-to-main run that cut the tag; `secrets: inherit` passes the optional
  # WINDOWS_PFX_* signing secrets through.
  windows-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/windows-release.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
