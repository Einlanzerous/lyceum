name: mobile

# Native Flutter Android app (LYCM-700). Scoped to the Flutter sources so other
# changes don't pay for it. Mirrors Argosy's mobile.yml.
on:
  pull_request:
    paths: ["mobile/lyceum/**", ".github/workflows/mobile.yml"]
  push:
    branches: [main]
    paths: ["mobile/lyceum/**", ".github/workflows/mobile.yml"]

permissions:
  contents: read

jobs:
  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/lyceum
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
          cache: true
      - name: Resolve deps
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
      - name: Build debug APK
        run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: lyceum-android-flutter-debug
          path: mobile/lyceum/build/app/outputs/flutter-apk/app-debug.apk
